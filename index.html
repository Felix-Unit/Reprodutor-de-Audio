<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Reprodutor de Áudio</title>
</head>
<body>

    <div class="player-container">
        <!-- Elemento de áudio invisível -->
        <audio id="audio-element" preload="metadata"></audio>

        <!-- Capa da Música / Visualizador -->
        <div class="cover-art-container">
            <div class="visualizer" id="visualizer">
                <div class="shadow"></div>
            </div>
        </div>

        <!-- Título e Artista -->
        <div class="track-info">
            <h2 id="track-title" class="track-title">Carregando...</h2>
            <p id="track-artist" class="track-artist">Aguarde</p>
        </div>

        <!-- Barra de Progresso -->
        <div class="progress-container">
            <input type="range" id="progress-bar" value="0" min="0" max="100" step="1">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration-time">0:00</span>
            </div>
        </div>

        <!-- Controles Principais -->
        <div class="controls">
            <button class="btn" id="btn-repeat" aria-label="Repetir Música" title="Repetir Música">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
            
            <button class="btn" id="btn-prev" aria-label="Música Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="btn btn-play-pause" id="btn-play-pause" aria-label="Reproduzir/Pausar">
                <!-- Ícone de Play (padrão) -->
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Ícone de Pause (oculto por padrão) -->
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <button class="btn" id="btn-next" aria-label="Próxima Música">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <!-- Controle de Volume -->
        <div class="volume-container">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" id="volume-bar" value="100" min="0" max="100">
        </div>

        <!-- Lista de Reprodução -->
        <div class="playlist-container">
            <div class="playlist-header">
                <h3 class="playlist-title">Lista de Reprodução</h3>
                <!-- Input invisível para selecionar arquivos -->
                <input type="file" id="file-input" multiple accept="audio/*" style="display: none;">
                <button class="btn-add-local" id="btn-add-local">+ Adicionar</button>
            </div>
            
            <ul class="playlist" id="playlist-list">
                <!-- Itens injetados via JS -->
            </ul>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
